# tasks file for calico
---
- name: Download Calico operator manifest
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/tigera-operator.yaml"
    dest: /tmp/tigera-operator.yaml
    mode: '0644'
  delegate_to: "{{ first_cp_hostname }}"
  run_once: true

- name: Download Calico custom resources manifest
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/custom-resources.yaml"
    dest: /tmp/custom-resources.yaml
    mode: '0644'
  delegate_to: "{{ first_cp_hostname }}"
  run_once: true

- name: Apply Calico operator manifest
  ansible.builtin.command: kubectl apply --server-side --force-conflicts -f /tmp/tigera-operator.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  delegate_to: "{{ first_cp_hostname }}"
  run_once: true
  changed_when: true

- name: Apply Calico Installation with custom pod CIDR
  ansible.builtin.shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: operator.tigera.io/v1
    kind: Installation
    metadata:
      name: default
    spec:
      calicoNetwork:
        ipPools:
        - cidr: {{ pod_cidr }}
          encapsulation: VXLAN
          natOutgoing: Enabled
          nodeSelector: all()
    EOF
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  delegate_to: "{{ first_cp_hostname }}"
  run_once: true
  changed_when: true

- name: Wait for calico-node DaemonSet to be created by operator
  ansible.builtin.shell: |
    kubectl get daemonset calico-node -n calico-system --no-headers 2>/dev/null | wc -l
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  delegate_to: "{{ first_cp_hostname }}"
  run_once: true
  register: calico_ds_count
  retries: 30
  delay: 10
  until: calico_ds_count.stdout | int > 0
  changed_when: false

- name: Wait for Calico pods to be running
  ansible.builtin.command: >
    kubectl wait --for=condition=Ready pod
    -l k8s-app=calico-node -n calico-system --timeout=300s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  delegate_to: "{{ first_cp_hostname }}"
  run_once: true
  changed_when: false
