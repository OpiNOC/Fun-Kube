# tasks file for containerd
---
- name: Ensure /etc/apt/keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    force: false
  become: true

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ ansible_architecture | replace('aarch64', 'arm64') | replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
  become: true

- name: Install containerd.io
  ansible.builtin.apt:
    name: containerd.io
    state: present
    update_cache: true
  become: true

- name: Ensure /etc/containerd directory exists
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: '0755'
  become: true

# Genera il config atteso (default + SystemdCgroup=true) e lo applica solo se diverso
- name: Generate and apply containerd config (idempotent)
  ansible.builtin.shell: |
    containerd config default > /tmp/_containerd_new.toml
    sed -i 's/^\(\s*\)SystemdCgroup = false/\1SystemdCgroup = true/' /tmp/_containerd_new.toml
    if diff -q /tmp/_containerd_new.toml /etc/containerd/config.toml > /dev/null 2>&1; then
      echo "ok"
    else
      cp /tmp/_containerd_new.toml /etc/containerd/config.toml
      echo "updated"
    fi
  args:
    executable: /bin/bash
  register: _containerd_config_result
  changed_when: "_containerd_config_result.stdout | trim == 'updated'"
  become: true
  notify: Restart containerd

- name: Flush handlers (restart containerd now if config changed)
  ansible.builtin.meta: flush_handlers

- name: Ensure containerd service is enabled and started
  ansible.builtin.systemd:
    name: containerd
    enabled: true
    state: started
    daemon_reload: true
  become: true
