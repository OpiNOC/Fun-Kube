---
# Tutte le task Helm/kubectl vengono delegate alla bootstrap machine (localhost)
# che ha già Helm installato e il kubeconfig del cluster in /root/.kube/{{ cluster_name }}.

- name: Add Traefik Helm repository
  ansible.builtin.command: helm repo add traefik https://traefik.github.io/charts
  register: helm_repo_add
  changed_when: "'already exists' not in helm_repo_add.stderr"
  failed_when: helm_repo_add.rc != 0 and 'already exists' not in helm_repo_add.stderr
  environment:
    KUBECONFIG: /root/.kube/{{ cluster_name }}
  delegate_to: localhost
  run_once: true

- name: Update Helm repositories
  ansible.builtin.command: helm repo update
  environment:
    KUBECONFIG: /root/.kube/{{ cluster_name }}
  delegate_to: localhost
  run_once: true
  changed_when: false

- name: Template Traefik Helm values
  ansible.builtin.template:
    src: values.yaml.j2
    dest: /tmp/traefik-values.yaml
    mode: '0644'
  delegate_to: localhost
  run_once: true

- name: Install/upgrade Traefik via Helm
  ansible.builtin.command: >
    helm upgrade --install traefik traefik/traefik
    --namespace {{ traefik_namespace }}
    --create-namespace
    --values /tmp/traefik-values.yaml
    --wait
    --timeout 5m0s
  environment:
    KUBECONFIG: /root/.kube/{{ cluster_name }}
  delegate_to: localhost
  run_once: true
  changed_when: true

- name: Wait for Traefik DaemonSet rollout
  ansible.builtin.command: >
    kubectl rollout status daemonset/traefik
    -n {{ traefik_namespace }}
    --timeout=300s
  environment:
    KUBECONFIG: /root/.kube/{{ cluster_name }}
  delegate_to: localhost
  run_once: true
  changed_when: false

- name: Template dashboard IngressRoute
  ansible.builtin.template:
    src: dashboard-ingressroute.yaml.j2
    dest: /tmp/traefik-dashboard.yaml
    mode: '0644'
  delegate_to: localhost
  run_once: true
  when: traefik_dashboard_host | length > 0

- name: Apply dashboard IngressRoute
  ansible.builtin.command: >
    kubectl apply -f /tmp/traefik-dashboard.yaml --validate=false
  environment:
    KUBECONFIG: /root/.kube/{{ cluster_name }}
  delegate_to: localhost
  run_once: true
  changed_when: true
  when: traefik_dashboard_host | length > 0

- name: Template ClusterIssuer Let's Encrypt
  ansible.builtin.template:
    src: clusterissuer.yaml.j2
    dest: /tmp/traefik-clusterissuer.yaml
    mode: '0644'
  delegate_to: localhost
  run_once: true
  when: traefik_acme_email | length > 0

- name: Apply ClusterIssuer Let's Encrypt
  ansible.builtin.command: >
    kubectl apply -f /tmp/traefik-clusterissuer.yaml --validate=false
  environment:
    KUBECONFIG: /root/.kube/{{ cluster_name }}
  delegate_to: localhost
  run_once: true
  changed_when: true
  when: traefik_acme_email | length > 0

- name: Show Traefik service info
  ansible.builtin.command: kubectl get svc traefik -n {{ traefik_namespace }}
  environment:
    KUBECONFIG: /root/.kube/{{ cluster_name }}
  delegate_to: localhost
  run_once: true
  changed_when: false
  ignore_errors: true
