# tasks file for common
---
- name: Set unique hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"
  become: true

- name: Disable swap
  ansible.builtin.command: swapoff -a
  become: true
  changed_when: true
  ignore_errors: true

- name: Remove swap from /etc/fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*?\sswap\s+.*)$'
    replace: '# \1'
  become: true

- name: Ensure k8s modules load file exists
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    mode: '0644'
  become: true

- name: Load overlay module
  ansible.builtin.modprobe:
    name: overlay
    state: present
  become: true

- name: Load br_netfilter module
  ansible.builtin.modprobe:
    name: br_netfilter
    state: present
  become: true

- name: Ensure k8s sysctl file exists
  ansible.builtin.copy:
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1
    mode: '0644'
  become: true

- name: Apply sysctl settings
  ansible.builtin.command: sysctl --system
  become: true
  changed_when: true

- name: Install base packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - nfs-common
      - open-iscsi
    state: present
    update_cache: true
  become: true

- name: Enable and start iscsid (required by Longhorn)
  ansible.builtin.systemd:
    name: iscsid
    enabled: true
    state: started
  become: true
