# tasks file for longhorn
---
- name: Check nfs-common prerequisite on all nodes
  ansible.builtin.command: which mount.nfs
  become: true
  changed_when: false

- name: Download Longhorn manifest
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/longhorn/longhorn/{{ longhorn_version }}/deploy/longhorn.yaml"
    dest: /tmp/longhorn.yaml
    mode: '0644'
  delegate_to: "{{ first_cp_hostname }}"
  run_once: true

- name: Apply Longhorn manifest
  ansible.builtin.command: kubectl apply -f /tmp/longhorn.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  delegate_to: "{{ first_cp_hostname }}"
  run_once: true
  changed_when: true

- name: Wait for Longhorn pods to be running
  ansible.builtin.command: |
    kubectl wait --for=condition=Ready pod --all -n {{ longhorn_namespace }} --timeout=300s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  delegate_to: "{{ first_cp_hostname }}"
  run_once: true
  changed_when: false
  ignore_errors: true

- name: Verify longhorn-rwx StorageClass exists
  ansible.builtin.command: kubectl get storageclass longhorn-rwx
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  delegate_to: "{{ first_cp_hostname }}"
  run_once: true
  changed_when: false
  when: longhorn_rwx | default(false) | bool
  ignore_errors: true
