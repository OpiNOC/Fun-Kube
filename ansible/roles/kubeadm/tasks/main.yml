# tasks file for kubeadm
# Nota: k8s_version_resolved è risolto dal runner Python e passato come extra_var.
---
- name: Determine k8s minor version for repo
  ansible.builtin.set_fact:
    k8s_minor_version: "{{ k8s_version_resolved | regex_replace('^v?(\\d+\\.\\d+).*', '\\1') }}"

- name: Ensure /etc/apt/keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true

- name: Download Kubernetes GPG key
  ansible.builtin.get_url:
    url: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_minor_version }}/deb/Release.key"
    dest: "/etc/apt/keyrings/kubernetes-{{ k8s_minor_version }}.asc"
    mode: '0644'
    force: false
  become: true

- name: Add Kubernetes apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-{{ k8s_minor_version }}.asc] https://pkgs.k8s.io/core:/stable:/v{{ k8s_minor_version }}/deb/ /"
    state: present
    filename: "kubernetes-{{ k8s_minor_version }}"
  become: true

- name: Install kubelet, kubeadm and kubectl
  ansible.builtin.apt:
    name:
      - "kubelet={{ k8s_version_resolved | regex_replace('^v', '') }}-1.1"
      - "kubeadm={{ k8s_version_resolved | regex_replace('^v', '') }}-1.1"
      - "kubectl={{ k8s_version_resolved | regex_replace('^v', '') }}-1.1"
    state: present
    update_cache: true
    allow_downgrade: true
  become: true
  ignore_errors: true

- name: Install kubelet, kubeadm and kubectl (fallback without strict version)
  ansible.builtin.apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    update_cache: true
  become: true
  when: ansible_failed_result is defined and ansible_failed_result.failed

- name: Hold kubernetes packages
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl
  become: true

- name: Enable kubelet service
  ansible.builtin.systemd:
    name: kubelet
    enabled: true
  become: true
