# tasks file for kubeadm
---
- name: Resolve latest stable k8s minor version
  ansible.builtin.uri:
    url: https://dl.k8s.io/release/stable.txt
    return_content: true
  register: k8s_stable_version
  when: k8s_version == "latest"
  run_once: true

- name: Set resolved k8s version fact
  ansible.builtin.set_fact:
    k8s_version_resolved: "{{ k8s_stable_version.content | trim }}"
  when: k8s_version == "latest"

- name: Use provided k8s version
  ansible.builtin.set_fact:
    k8s_version_resolved: "{{ k8s_version }}"
  when: k8s_version != "latest"

- name: Determine k8s minor version for repo
  ansible.builtin.set_fact:
    k8s_minor_version: "{{ k8s_version_resolved | regex_replace('^v?(\\d+\\.\\d+).*', '\\1') }}"

- name: Add Kubernetes GPG key
  ansible.builtin.apt_key:
    url: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_minor_version }}/deb/Release.key"
    keyring: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  become: true

- name: Add Kubernetes apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ k8s_minor_version }}/deb/ /"
    state: present
    filename: kubernetes
  become: true

- name: Install kubelet, kubeadm and kubectl
  ansible.builtin.apt:
    name:
      - "kubelet={{ k8s_version_resolved | regex_replace('^v', '') }}-1.1"
      - "kubeadm={{ k8s_version_resolved | regex_replace('^v', '') }}-1.1"
      - "kubectl={{ k8s_version_resolved | regex_replace('^v', '') }}-1.1"
    state: present
    update_cache: true
    allow_downgrade: true
  become: true
  ignore_errors: true

- name: Install kubelet, kubeadm and kubectl (fallback without strict version)
  ansible.builtin.apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    update_cache: true
  become: true
  when: ansible_failed_result is defined and ansible_failed_result.failed

- name: Hold kubernetes packages
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl
  become: true

- name: Enable kubelet service
  ansible.builtin.systemd:
    name: kubelet
    enabled: true
  become: true
