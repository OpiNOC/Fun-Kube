# Deploy Ingress controller
---
- name: Deploy Ingress
  hosts: control_plane[0]
  become: true
  tasks:
    - name: Include Traefik role
      ansible.builtin.include_role:
        name: traefik
      when: (ingress_enabled | default(false) | bool) and ingress_type == "traefik"

    - name: Include Nginx Proxy Manager role
      ansible.builtin.include_role:
        name: nginx-proxy-manager
      when: (ingress_enabled | default(false) | bool) and ingress_type == "nginx-proxy-manager"
