# Deploy Longhorn — storage distribuito
#
# Play 1: prerequisiti su tutti i nodi (nfs-common, open-iscsi)
# Play 2: deploy manifest Longhorn dal primo CP (idempotente: skip se versione già corretta)
# Play 3: patch UI NodePort (opzionale, se longhorn_ui_nodeport > 0)
---
- name: Longhorn prerequisites on all nodes
  hosts: control_plane,workers
  become: true
  tasks:
    - name: Install Longhorn prerequisites
      ansible.builtin.apt:
        name:
          - nfs-common
          - open-iscsi
        state: present
        update_cache: true
      when: longhorn_enabled | default(false) | bool

    - name: Enable and start iscsid
      ansible.builtin.systemd:
        name: iscsid
        enabled: true
        state: started
      when: longhorn_enabled | default(false) | bool


- name: Deploy Longhorn
  hosts: control_plane[0]
  become: true
  tasks:
    - name: Check if longhorn-manager already installed
      ansible.builtin.command: >
        kubectl get daemonset longhorn-manager -n {{ longhorn_namespace }}
        -o jsonpath='{.metadata.annotations.longhorn\.io/version}'
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: lh_installed_version
      changed_when: false
      failed_when: false
      when: longhorn_enabled | default(false) | bool

    - name: Fail if installed version is incompatible (manual intervention required)
      ansible.builtin.fail:
        msg: >
          Longhorn è già installato con versione {{ lh_installed_version.stdout }},
          ma la versione target è {{ longhorn_version }}.
          Longhorn non supporta upgrade di più di un minor version alla volta.
          Eseguire la procedura di upgrade manuale oppure disinstallare prima:
            kubectl delete namespace {{ longhorn_namespace }}
            kubectl delete crd -l app.kubernetes.io/name=longhorn
      when:
        - longhorn_enabled | default(false) | bool
        - lh_installed_version.rc == 0
        - lh_installed_version.stdout != ""
        - lh_installed_version.stdout != longhorn_version

    - name: Skip deploy if already at target version
      ansible.builtin.debug:
        msg: "Longhorn {{ longhorn_version }} già installato, skip apply."
      when:
        - longhorn_enabled | default(false) | bool
        - lh_installed_version.rc == 0
        - lh_installed_version.stdout == longhorn_version

    - name: Download Longhorn manifest
      ansible.builtin.get_url:
        url: "https://raw.githubusercontent.com/longhorn/longhorn/{{ longhorn_version }}/deploy/longhorn.yaml"
        dest: /tmp/longhorn.yaml
        mode: '0644'
        force: true
      when:
        - longhorn_enabled | default(false) | bool
        - lh_installed_version.rc != 0 or lh_installed_version.stdout == ""

    - name: Apply Longhorn manifest (client-side apply)
      # Client-side apply: non rimuove campi gestiti da longhorn-manager (es. conversion webhook CA).
      # --validate=false: evita download schema OpenAPI su cluster isolati.
      ansible.builtin.command: >
        kubectl apply --validate=false -f /tmp/longhorn.yaml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      changed_when: true
      when:
        - longhorn_enabled | default(false) | bool
        - lh_installed_version.rc != 0 or lh_installed_version.stdout == ""

    - name: Wait for longhorn-manager DaemonSet to exist
      ansible.builtin.command: >
        kubectl get daemonset longhorn-manager -n {{ longhorn_namespace }} --no-headers
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: lh_ds
      retries: 30
      delay: 10
      until: lh_ds.rc == 0
      changed_when: false
      when: longhorn_enabled | default(false) | bool

    - name: Wait for longhorn-manager pods to be Ready
      ansible.builtin.command: >
        kubectl rollout status daemonset/longhorn-manager -n {{ longhorn_namespace }} --timeout=300s
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      changed_when: false
      when: longhorn_enabled | default(false) | bool

    - name: Wait for longhorn-ui Deployment to be Available
      ansible.builtin.command: >
        kubectl rollout status deployment/longhorn-ui -n {{ longhorn_namespace }} --timeout=300s
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      changed_when: false
      when: longhorn_enabled | default(false) | bool

    - name: Verify default StorageClass longhorn
      ansible.builtin.command: kubectl get storageclass longhorn
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: _lh_sc_check
      retries: 12
      delay: 10
      until: _lh_sc_check.rc == 0
      changed_when: false
      when: longhorn_enabled | default(false) | bool

    - name: Patch longhorn StorageClass replicas
      ansible.builtin.command: >
        kubectl patch storageclass longhorn
        --type=merge
        -p '{"parameters":{"numberOfReplicas":"{{ longhorn_replicas | default(3) }}"}}'
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      changed_when: true
      when: longhorn_enabled | default(false) | bool

    - name: Create longhorn-rwx StorageClass
      ansible.builtin.shell: |
        kubectl apply --validate=false -f - <<'EOF'
        apiVersion: storage.k8s.io/v1
        kind: StorageClass
        metadata:
          name: longhorn-rwx
        provisioner: driver.longhorn.io
        allowVolumeExpansion: true
        reclaimPolicy: Delete
        volumeBindingMode: Immediate
        parameters:
          numberOfReplicas: "{{ longhorn_replicas | default(3) }}"
          staleReplicaTimeout: "30"
          fromBackup: ""
          fsType: "ext4"
          dataLocality: "disabled"
          unmapMarkSnapChainRemoved: "ignored"
          disableRevisionCounter: "true"
          dataEngine: "v1"
          backupTargetName: "default"
          nfsOptions: "vers=4.1,noresvport"
        EOF
      args:
        executable: /bin/bash
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: _lh_rwx_sc
      until: _lh_rwx_sc.rc == 0
      retries: 6
      delay: 10
      changed_when: "'created' in _lh_rwx_sc.stdout or 'configured' in _lh_rwx_sc.stdout"
      when:
        - longhorn_enabled | default(false) | bool
        - longhorn_rwx | default(false) | bool

    - name: Verify longhorn-rwx StorageClass
      ansible.builtin.command: kubectl get storageclass longhorn-rwx
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      changed_when: false
      when:
        - longhorn_enabled | default(false) | bool
        - longhorn_rwx | default(false) | bool


- name: Expose Longhorn UI via NodePort
  hosts: control_plane[0]
  become: true
  tasks:
    - name: Check current longhorn-frontend Service type
      ansible.builtin.command: >
        kubectl get service longhorn-frontend -n {{ longhorn_namespace }}
        -o jsonpath='{.spec.type}'
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: lh_svc_type
      changed_when: false
      failed_when: false
      when:
        - longhorn_enabled | default(false) | bool
        - longhorn_ui_nodeport | default(0) | int > 0

    - name: Patch longhorn-frontend Service to NodePort
      ansible.builtin.command: >
        kubectl patch service longhorn-frontend -n {{ longhorn_namespace }}
        --type='json'
        -p='[{"op":"replace","path":"/spec/type","value":"NodePort"},
             {"op":"add","path":"/spec/ports/0/nodePort","value":{{ longhorn_ui_nodeport }}}]'
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      changed_when: true
      when:
        - longhorn_enabled | default(false) | bool
        - longhorn_ui_nodeport | default(0) | int > 0
        - lh_svc_type.stdout != "NodePort"
