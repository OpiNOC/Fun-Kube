# Crea un kubeconfig non-scadente per la bootstrap machine
# basato su ServiceAccount con token Secret (non ha expiry)
---
- name: Create non-expiring SA kubeconfig for bootstrap machine
  hosts: control_plane[0]
  become: true
  tasks:
    - name: Wait for API server to be ready
      ansible.builtin.command: kubectl cluster-info
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: api_ready
      until: api_ready.rc == 0
      retries: 30
      delay: 10
      changed_when: false

    - name: Create fun-kube-admin ServiceAccount
      ansible.builtin.shell: |
        kubectl apply --validate=false -f - <<EOF
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: fun-kube-admin
          namespace: kube-system
        EOF
      args:
        executable: /bin/bash
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: _sa_apply
      until: _sa_apply.rc == 0
      retries: 10
      delay: 10
      changed_when: false

    - name: Create ClusterRoleBinding cluster-admin
      ansible.builtin.shell: |
        kubectl apply --validate=false -f - <<EOF
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: fun-kube-admin
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: cluster-admin
        subjects:
        - kind: ServiceAccount
          name: fun-kube-admin
          namespace: kube-system
        EOF
      args:
        executable: /bin/bash
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: _crb_apply
      until: _crb_apply.rc == 0
      retries: 10
      delay: 10
      changed_when: false

    - name: Create non-expiring token Secret
      ansible.builtin.shell: |
        kubectl apply --validate=false -f - <<EOF
        apiVersion: v1
        kind: Secret
        metadata:
          name: fun-kube-admin-token
          namespace: kube-system
          annotations:
            kubernetes.io/service-account.name: fun-kube-admin
        type: kubernetes.io/service-account-token
        EOF
      args:
        executable: /bin/bash
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: _secret_apply
      until: _secret_apply.rc == 0
      retries: 10
      delay: 10
      changed_when: false

    - name: Wait for token to be populated
      ansible.builtin.command: >
        kubectl -n kube-system get secret fun-kube-admin-token
        -o jsonpath='{.data.token}'
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: token_check
      until: token_check.stdout | length > 0
      retries: 10
      delay: 3
      changed_when: false

    - name: Get SA token (decoded)
      ansible.builtin.set_fact:
        sa_token: "{{ token_check.stdout | b64decode }}"

    - name: Get cluster CA cert (base64)
      ansible.builtin.command: >
        kubectl -n kube-system get secret fun-kube-admin-token
        -o jsonpath='{.data.ca\.crt}'
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: ca_cert_b64
      changed_when: false

    - name: Ensure /root/.kube exists on bootstrap machine
      ansible.builtin.file:
        path: /root/.kube
        state: directory
        mode: '0700'
      delegate_to: localhost
      become: false

    - name: Write SA kubeconfig to bootstrap machine
      ansible.builtin.copy:
        content: |
          apiVersion: v1
          kind: Config
          clusters:
          - cluster:
              server: https://{{ api_endpoint }}:6443
              certificate-authority-data: {{ ca_cert_b64.stdout }}
            name: {{ cluster_name }}
          contexts:
          - context:
              cluster: {{ cluster_name }}
              user: fun-kube-admin
            name: {{ cluster_name }}
          current-context: {{ cluster_name }}
          users:
          - name: fun-kube-admin
            user:
              token: {{ sa_token }}
        dest: "/root/.kube/{{ cluster_name }}"
        mode: '0600'
      delegate_to: localhost
      become: false
