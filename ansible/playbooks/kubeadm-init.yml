# Initialize the first control-plane node
# Nota: k8s_version_resolved è risolto dal runner Python e passato come extra_var.
---
- name: Initialize first control-plane
  hosts: control_plane[0]
  become: true
  vars:
    # Tutti i CP IPs + eventuali extra SANs dall'utente, deduplicate.
    # Il --control-plane-endpoint (VIP o primo CP) è già incluso automaticamente da kubeadm;
    # aggiungiamo qui tutti i CP per permettere connessioni dirette a ogni nodo.
    cert_extra_sans: "{{ (all_cp_ips + api_server_extra_sans) | unique | join(',') }}"
  tasks:
    - name: Check if cluster is already initialized
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: admin_conf

    - name: Run kubeadm init
      ansible.builtin.command: >
        kubeadm init
        --control-plane-endpoint "{{ api_endpoint }}:6443"
        --pod-network-cidr "{{ pod_cidr }}"
        --service-cidr "{{ service_cidr }}"
        --kubernetes-version "{{ k8s_version_resolved }}"
        --apiserver-cert-extra-sans "{{ cert_extra_sans }}"
        --upload-certs
      when: not admin_conf.stat.exists
      changed_when: true

    - name: Create .kube directory for ansible user
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.kube"
        state: directory
        mode: '0755'
      when: not admin_conf.stat.exists

    - name: Copy admin.conf to ansible user kubeconfig
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: "{{ ansible_env.HOME }}/.kube/config"
        mode: '0600'
        remote_src: true
      when: not admin_conf.stat.exists

    - name: Generate worker join command
      ansible.builtin.command: kubeadm token create --print-join-command
      register: worker_join_cmd
      changed_when: false

    - name: Save worker join script
      ansible.builtin.copy:
        content: "{{ worker_join_cmd.stdout }}"
        dest: /etc/kubernetes/kubeadm-join-worker.sh
        mode: '0700'

    - name: Generate control-plane certificate key
      ansible.builtin.command: kubeadm init phase upload-certs --upload-certs
      register: cert_key_output
      changed_when: false
      when: topology == 'ha'

    - name: Save control-plane join script
      ansible.builtin.copy:
        content: "{{ worker_join_cmd.stdout }} --control-plane --certificate-key {{ cert_key_output.stdout_lines | last }}"
        dest: /etc/kubernetes/kubeadm-join-cp.sh
        mode: '0700'
      when: topology == 'ha'
