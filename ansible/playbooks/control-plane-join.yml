# Join additional control-plane nodes
---
- name: Join additional control-planes
  hosts: control_plane[1:]
  become: true
  tasks:
    - name: Read control-plane join command from first CP
      ansible.builtin.command: cat /tmp/kubeadm-join-cp.sh
      delegate_to: "{{ first_cp_hostname }}"
      register: cp_join_cmd_raw
      changed_when: false

    - name: Check if already joined
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Skip if already joined
      ansible.builtin.debug:
        msg: "Node already joined, skipping."
      when: kubelet_conf.stat.exists

    - name: Join control-plane node
      ansible.builtin.command: "{{ cp_join_cmd_raw.stdout }}"
      when: not kubelet_conf.stat.exists
      changed_when: true

    - name: Create .kube directory for ansible user
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.kube"
        state: directory
        mode: '0755'
      when: not kubelet_conf.stat.exists

    - name: Copy admin.conf to ansible user kubeconfig
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: "{{ ansible_env.HOME }}/.kube/config"
        mode: '0600'
        remote_src: true
      when: not kubelet_conf.stat.exists
