[defaults]
# Path ai roles relativo alla directory ansible/
roles_path = roles

# Non verificare host key (gestito dall'inventory via ansible_ssh_common_args)
host_key_checking = False

# Output leggibile
stdout_callback = yaml
stderr_callback = yaml

# Timeout connessione SSH
timeout = 30

# Parallelismo
forks = 10

# Non creare file .retry
retry_files_enabled = False

[ssh_connection]
# Riutilizza connessioni SSH (più veloce su cluster grandi)
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
pipelining = True
